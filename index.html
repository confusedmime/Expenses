<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14171d">
<title>Bills</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#14171d; --card:#1c2128; --card-paid:#181f1b; --line:#2a3038;
    --text:#e9e6df; --muted:#8a919c; --dim:#565c66; --disabled:#3a4048;
    --amber:#e8b04b; --green:#7cbf8a; --red:#e07a6b;
    --mono:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
       padding-bottom:200px;-webkit-tap-highlight-color:transparent}
  .wrap{max-width:560px;margin:0 auto;padding:24px 16px 0}
  header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  h1{font-size:26px;font-weight:700;margin:0;letter-spacing:-0.02em}
  .subtle{color:var(--muted);font-size:13px;margin-bottom:10px}
  button{font-family:var(--sans);cursor:pointer}
  .ghost{background:none;border:1px solid var(--line);color:var(--muted);
         border-radius:8px;padding:5px 10px;font-size:12px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .bill{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:10px 12px;margin-bottom:8px;transition:background .15s,opacity .15s}
  .bill.paid{background:var(--card-paid);border-color:#24332a;opacity:.72}
  .bill.partial{border-left:3px solid var(--amber)}
  .row1{display:flex;align-items:center;gap:10px}
  .check{width:26px;height:26px;min-width:26px;border-radius:8px;
         border:1.5px solid var(--muted);background:transparent;color:var(--bg);
         font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
  .paid .check{border-color:var(--green);background:var(--green)}
  .partial .check{border-color:var(--amber);color:var(--amber);font-size:11px}
  .name{flex:1;min-width:0;background:transparent;border:none;outline:none;
        color:var(--text);font-size:15px;font-family:var(--sans);padding:0}
  .paid .name{text-decoration:line-through}
  .dollar{color:var(--muted);font-family:var(--mono);font-size:14px}
  .amt{width:84px;background:transparent;border:none;outline:none;
       border-bottom:1px dashed var(--line);color:var(--text);
       font-family:var(--mono);font-size:15px;text-align:right;padding:2px 0}
  .paid .amt{color:var(--muted)}
  .del{background:none;border:none;color:var(--muted);font-size:16px;padding:0 2px;line-height:1}
  .row2{display:flex;align-items:center;gap:8px;margin-top:6px;margin-left:36px;flex-wrap:wrap}
  .due{background:transparent;border:none;outline:none;color:var(--muted);
       font-family:var(--mono);font-size:12px;color-scheme:dark;padding:0}
  .due.empty{color:var(--dim)}
  .duenote{font-size:12px;font-family:var(--mono)}
  .partnote{font-size:12px;font-family:var(--mono);color:var(--amber)}
  .mini{background:none;border:1px solid var(--line);border-radius:6px;
        color:var(--dim);font-size:11px;padding:2px 7px}
  .mini.on{color:var(--green);border-color:#2e4636}
  .movers{margin-left:auto;display:flex;gap:6px}
  .mv{background:transparent;border:1px solid var(--line);border-radius:7px;
      color:var(--muted);width:30px;height:24px;font-size:12px;line-height:1;padding:0}
  .mv:disabled{color:var(--disabled);cursor:default}
  .add{width:100%;background:transparent;border:1px dashed var(--line);color:var(--muted);
       border-radius:12px;padding:11px 0;font-size:14px;margin-top:4px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;
         padding:12px;margin-bottom:16px;font-size:13px;display:none}
  .panel.open{display:block}
  .panel h3{margin:0 0 8px;font-size:13px;color:var(--muted);
            text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .hrow{display:flex;justify-content:space-between;font-family:var(--mono);
        font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}
  .hrow:last-child{border-bottom:none}
  footer{position:fixed;left:0;right:0;bottom:0;background:#101318;
         border-top:1px solid var(--line);
         padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
  .finner{max-width:560px;margin:0 auto}
  .bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:10px}
  .fill{height:100%;background:var(--green);transition:width .25s;width:0}
  .totals{display:flex;justify-content:space-between;align-items:flex-end}
  .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .big{font-family:var(--mono);font-size:28px;font-weight:600;letter-spacing:-0.01em}
  .side{text-align:right;font-family:var(--mono);font-size:13px;color:var(--muted);line-height:1.7}
  .gap{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;
       border-top:1px solid var(--line);font-size:13px;color:var(--muted);flex-wrap:wrap}
  .income{width:80px;background:transparent;border:none;outline:none;
          border-bottom:1px dashed var(--line);color:var(--text);
          font-family:var(--mono);font-size:14px;text-align:right;padding:1px 0}
  .gapnote{font-family:var(--mono);margin-left:auto}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Bills</h1>
    <button class="ghost" id="reset">New month ↺</button>
  </header>
  <div class="subtle" id="count"></div>

  <div class="toolbar">
    <button class="ghost" id="sortbtn">Sort by due date</button>
    <button class="ghost" id="histbtn">History</button>
    <button class="ghost" id="exportbtn">Backup</button>
    <button class="ghost" id="importbtn">Restore</button>
    <input type="file" id="importfile" accept=".json,application/json" style="display:none">
  </div>

  <div class="panel" id="histpanel">
    <h3>Past months</h3>
    <div id="histlist"></div>
  </div>

  <div id="list"></div>
  <button class="add" id="add">+ Add a bill</button>
</div>

<footer>
  <div class="finner">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="totals">
      <div>
        <div class="lbl">Remaining</div>
        <div class="big" id="remaining">$0.00</div>
      </div>
      <div class="side">
        <div>paid&nbsp;&nbsp;<span id="paidout" style="color:var(--green)"></span></div>
        <div>total&nbsp;<span id="totalout" style="color:var(--text)"></span></div>
      </div>
    </div>
    <div class="gap">
      <span>Cash for bills&nbsp;$</span><input class="income" id="income" inputmode="decimal">
      <span class="gapnote" id="gapnote"></span>
    </div>
  </div>
</footer>

<script>
const KEY = "bills-data-v2";
const OLDKEY = "bills-data-v1";
const uid = () => "b"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const money = n => n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

const DEFAULTS = [
  ["Rent",1200],["Car payment",350],["Phone",60],["Electric",90],
  ["Internet",50],["Insurance",120],["Subscriptions",30],["Groceries",300]
].map(([name,amount])=>({id:uid()+Math.random().toString(36).slice(2,4),
  name,amount,paid:false,paidAmount:0,due:"",autopay:false}));

// ---- load / migrate ----
let state = null;
try {
  const v2 = JSON.parse(localStorage.getItem(KEY));
  if (v2 && Array.isArray(v2.bills)) state = v2;
} catch(e){}
if (!state) {
  let old = null;
  try { old = JSON.parse(localStorage.getItem(OLDKEY)); } catch(e){}
  if (Array.isArray(old)) {
    state = {
      bills: old.map(b => ({...b, paidAmount:0, autopay:false})),
      income: 0, history: []
    };
  } else {
    state = { bills: DEFAULTS, income: 0, history: [] };
  }
}
state.income = state.income || 0;
state.history = state.history || [];

const save = () => localStorage.setItem(KEY, JSON.stringify(state));

// ---- helpers ----
const paidOf = b => b.paid ? (b.amount||0) : Math.min(b.paidAmount||0, b.amount||0);
const leftOf = b => Math.max((b.amount||0) - paidOf(b), 0);

function dueMeta(due){
  if(!due) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const [y,m,d] = due.split("-").map(Number);
  const days = Math.round((new Date(y,m-1,d)-t)/86400000);
  if(days<0)  return {note:`${-days}d late`, color:"var(--red)"};
  if(days===0)return {note:"today",          color:"var(--red)"};
  if(days<=3) return {note:`in ${days}d`,    color:"var(--amber)"};
  return {note:`in ${days}d`, color:"var(--muted)"};
}

function addMonth(iso){
  const [y,m,d] = iso.split("-").map(Number);
  const lastDayNext = new Date(y, m+1, 0).getDate(); // m is 1-based, so (y,m) = next month
  const day = Math.min(d, lastDayNext);
  const dt = new Date(y, m, day);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}

// ---- render ----
function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";
  state.bills.forEach((b,idx)=>{
    const partial = !b.paid && (b.paidAmount||0) > 0;
    const card = document.createElement("div");
    card.className = "bill" + (b.paid ? " paid" : "") + (partial ? " partial" : "");

    const r1 = document.createElement("div"); r1.className = "row1";

    const chk = document.createElement("button");
    chk.className = "check";
    chk.textContent = b.paid ? "✓" : (partial ? "½" : "");
    chk.setAttribute("aria-label", b.paid ? "Mark unpaid" : "Mark paid");
    chk.onclick = () => {
      b.paid = !b.paid;
      if (b.paid) b.paidAmount = 0;
      save(); render();
    };

    const name = document.createElement("input");
    name.className = "name"; name.value = b.name; name.placeholder = "Bill name";
    name.oninput = () => { b.name = name.value; save(); };

    const dollar = document.createElement("span");
    dollar.className = "dollar"; dollar.textContent = "$";

    const amt = document.createElement("input");
    amt.className = "amt"; amt.inputMode = "decimal"; amt.value = money(b.amount||0);
    amt.onfocus = () => { amt.value = String(b.amount||""); setTimeout(()=>amt.select(),0); };
    amt.onblur = () => {
      const v = parseFloat(amt.value.replace(/[^0-9.]/g,""));
      b.amount = isNaN(v) ? 0 : v;
      amt.value = money(b.amount);
      save(); updateTotals();
    };

    const del = document.createElement("button");
    del.className = "del"; del.textContent = "×"; del.setAttribute("aria-label","Delete bill");
    del.onclick = () => { state.bills = state.bills.filter(x=>x.id!==b.id); save(); render(); };

    r1.append(chk,name,dollar,amt,del);

    const r2 = document.createElement("div"); r2.className = "row2";

    const due = document.createElement("input");
    due.type = "date"; due.className = "due" + (b.due ? "" : " empty"); due.value = b.due||"";
    due.onchange = () => { b.due = due.value; save(); render(); };
    r2.append(due);

    const dm = b.paid ? null : dueMeta(b.due);
    if(dm){
      const n = document.createElement("span");
      n.className = "duenote"; n.style.color = dm.color; n.textContent = "· "+dm.note;
      r2.append(n);
    }

    if(partial){
      const p = document.createElement("span");
      p.className = "partnote";
      p.textContent = "· "+money(paidOf(b))+" paid, "+money(leftOf(b))+" left";
      r2.append(p);
    }

    if(!b.paid){
      const part = document.createElement("button");
      part.className = "mini"; part.textContent = partial ? "edit partial" : "partial";
      part.onclick = () => {
        const cur = b.paidAmount||0;
        const raw = window.prompt("Amount paid so far on "+(b.name||"this bill")+":", cur ? String(cur) : "");
        if(raw===null) return;
        const v = parseFloat(String(raw).replace(/[^0-9.]/g,""));
        if(isNaN(v) || v<=0){ b.paidAmount = 0; }
        else if(v >= (b.amount||0)){ b.paid = true; b.paidAmount = 0; }
        else { b.paidAmount = v; }
        save(); render();
      };
      r2.append(part);
    }

    const auto = document.createElement("button");
    auto.className = "mini" + (b.autopay ? " on" : "");
    auto.textContent = b.autopay ? "auto ✓" : "auto";
    auto.title = "Autopay";
    auto.onclick = () => { b.autopay = !b.autopay; save(); render(); };
    r2.append(auto);

    const movers = document.createElement("div"); movers.className = "movers";
    const up = document.createElement("button");
    up.className = "mv"; up.textContent = "▲"; up.disabled = idx===0;
    up.setAttribute("aria-label","Move up");
    up.onclick = () => { const a=state.bills; [a[idx-1],a[idx]]=[a[idx],a[idx-1]]; save(); render(); };
    const dn = document.createElement("button");
    dn.className = "mv"; dn.textContent = "▼"; dn.disabled = idx===state.bills.length-1;
    dn.setAttribute("aria-label","Move down");
    dn.onclick = () => { const a=state.bills; [a[idx+1],a[idx]]=[a[idx],a[idx+1]]; save(); render(); };
    movers.append(up,dn);
    r2.append(movers);

    card.append(r1,r2);
    list.append(card);
  });
  renderHistory();
  updateTotals();
}

function updateTotals(){
  const total = state.bills.reduce((s,b)=>s+(b.amount||0),0);
  const paid  = state.bills.reduce((s,b)=>s+paidOf(b),0);
  const rem   = total - paid;
  const remEl = document.getElementById("remaining");
  remEl.textContent = "$"+money(rem);
  remEl.style.color = rem>0 ? "var(--amber)" : "var(--green)";
  document.getElementById("paidout").textContent  = "$"+money(paid);
  document.getElementById("totalout").textContent = "$"+money(total);
  document.getElementById("fill").style.width = (total>0 ? paid/total*100 : 0)+"%";
  const fullPaid = state.bills.filter(b=>b.paid).length;
  document.getElementById("count").textContent = `${fullPaid} of ${state.bills.length} paid`;

  const gap = rem - (state.income||0);
  const note = document.getElementById("gapnote");
  if(rem <= 0){ note.textContent = "all covered ✓"; note.style.color = "var(--green)"; }
  else if(gap > 0){ note.textContent = "need $"+money(gap)+" more"; note.style.color = "var(--red)"; }
  else { note.textContent = "covered, $"+money(-gap)+" spare"; note.style.color = "var(--green)"; }
}

function renderHistory(){
  const el = document.getElementById("histlist");
  if(!state.history.length){
    el.innerHTML = '<div style="color:var(--dim)">Nothing archived yet — finish a month and hit "New month".</div>';
    return;
  }
  el.innerHTML = "";
  [...state.history].reverse().forEach(h=>{
    const row = document.createElement("div"); row.className = "hrow";
    const l = document.createElement("span"); l.textContent = h.label;
    const r = document.createElement("span");
    r.textContent = "$"+money(h.paid)+" / $"+money(h.total);
    r.style.color = h.paid >= h.total ? "var(--green)" : "var(--amber)";
    row.append(l,r); el.append(row);
  });
}

// ---- toolbar actions ----
document.getElementById("add").onclick = () => {
  state.bills.push({id:uid(),name:"",amount:0,paid:false,paidAmount:0,due:"",autopay:false});
  save(); render();
};

document.getElementById("reset").onclick = () => {
  if(!confirm("Archive this month and start fresh? Due dates roll forward one month.")) return;
  const total = state.bills.reduce((s,b)=>s+(b.amount||0),0);
  const paid  = state.bills.reduce((s,b)=>s+paidOf(b),0);
  const label = new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"});
  state.history.push({label, total, paid});
  if(state.history.length > 24) state.history = state.history.slice(-24);
  state.bills.forEach(b=>{
    b.paid = false; b.paidAmount = 0;
    if(b.due) b.due = addMonth(b.due);
  });
  state.income = 0;
  save(); render();
  document.getElementById("income").value = "";
};

document.getElementById("sortbtn").onclick = () => {
  state.bills.sort((a,b)=>{
    if(!a.due && !b.due) return 0;
    if(!a.due) return 1;
    if(!b.due) return -1;
    return a.due < b.due ? -1 : a.due > b.due ? 1 : 0;
  });
  save(); render();
};

document.getElementById("histbtn").onclick = () => {
  document.getElementById("histpanel").classList.toggle("open");
};

document.getElementById("exportbtn").onclick = () => {
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "bills-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  URL.revokeObjectURL(a.href);
};

document.getElementById("importbtn").onclick = () =>
  document.getElementById("importfile").click();

document.getElementById("importfile").onchange = (e) => {
  const f = e.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.bills)) throw new Error("bad format");
      if(!confirm("Replace everything with this backup ("+data.bills.length+" bills)?")) return;
      state = data;
      state.income = state.income||0;
      state.history = state.history||[];
      save(); render();
      document.getElementById("income").value = state.income ? String(state.income) : "";
    } catch(err){
      alert("That file doesn't look like a bill tracker backup.");
    }
    e.target.value = "";
  };
  reader.readAsText(f);
};

// ---- income field ----
const incomeEl = document.getElementById("income");
incomeEl.value = state.income ? String(state.income) : "";
incomeEl.oninput = () => {
  const v = parseFloat(incomeEl.value.replace(/[^0-9.]/g,""));
  state.income = isNaN(v) ? 0 : v;
  save(); updateTotals();
};

render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
